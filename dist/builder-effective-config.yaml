directories:
  output: dist
  buildResources: build
appId: com.luax.learn
productName: Luax
files:
  - filter:
      - main.js
      - preload.js
      - src/**/*
      - assistant/**/*
      - native/**/*
      - README.md
      - LICENSE
asarUnpack:
  - assistant/**/*
  - native/**/*
win:
  target:
    - nsis
    - portable
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Luax
electronVersion: 31.7.7
